<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investments</title>

  <style>
    body {
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Top-left Get Started Button */
    .cta-button {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 10px 20px;
      background: #FFD700; /* gold */
      color: #000;         /* black text */
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .cta-button:hover {
      background: #FFC107; /* darker gold on hover */
      transform: scale(1.05);
    }

    .container {
      padding: 80px 5%;
    }

    h1 {
      font-size: 3rem;
      color: #FFFFFF;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin-top: 20px;
      border-radius: 16px;
    }

    .card h2 {
      color: #D4AF37; /* gold accent */
      font-size: 1.5rem;
      margin-top: 0;
    }

    .card p {
      color: #E0E0E0;
      line-height: 1.6;
      font-size: 1rem;
    }

    /* 📱 Responsive Adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 60px 4%;
      }

      h1 {
        font-size: 2.2rem;
      }

      .card {
        padding: 16px;
      }

      .card h2 {
        font-size: 1.3rem;
      }

      .card p {
        font-size: 0.95rem;
      }

      .cta-button {
        padding: 8px 16px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }

      .card h2 {
        font-size: 1.1rem;
      }

      .card p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- Get Started Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Investment Solutions</h1>

    <div class="card">
      <h2>Mutual Funds</h2>
      <p>Professionally managed investment solutions for long-term financial growth.</p>

      <h2>Equity Investments</h2>
      <p>Strategic stock investments designed to maximize returns responsibly.</p>
    </div>
  </div>

</body>
</html>
