<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Wealth Tara</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    /* Top-left Get Started Button */
    .cta-button {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 10px 20px;
      background: #FFD700; /* gold */
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .cta-button:hover {
      background: #FFC107;
      transform: scale(1.05);
    }

    .container {
      padding: 100px 6%;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    p {
      color: #E0E0E0;
      line-height: 1.8;
      font-size: 1rem;
    }

    h3 {
      color: #FFD700;
      margin-top: 30px;
    }

    a {
      color: #1DA1F2; /* Twitter blue */
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    form {
      margin-top: 40px;
      max-width: 600px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 1rem;
    }

    button {
      padding: 14px 30px;
      border: none;
      background: #D4AF37;
      color: #0A1F44;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #FFC107;
    }

    /* 📱 Responsive Adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 80px 5%;
      }

      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 0.95rem;
      }

      .cta-button {
        padding: 8px 16px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 60px 4%;
      }

      h1 {
        font-size: 1.8rem;
      }

      p {
        font-size: 0.9rem;
      }

      h3 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Get Started Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Contact Us</h1>

    <p>
      Reach out to Wealth Tara Investments for financial guidance and investment solutions.
    </p>

    <h3>WHATSAPP: +91 - 9527210312 </h3>
    <br>
    Follow Mangesh N Kunjir on X -
    <a href="https://x.com/mangeshnkunjir" target="_blank" rel="noopener noreferrer">Visit Profile</a>
  </div>

</body>
</html>
