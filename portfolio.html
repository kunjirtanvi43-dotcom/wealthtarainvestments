<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b1220;
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    /* Top-left Home Button */
    .cta-button {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 10px 20px;
      background: #FFD700;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .cta-button:hover {
      background: #FFC107;
      transform: scale(1.05);
    }

    .container {
      padding: 100px 6%;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .box {
      background: #111827;
      padding: 25px;
      border-radius: 16px;
      text-align: center;
    }

    .box h2 {
      color: #2E8B57;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .box p {
      color: #E0E0E0;
      font-size: 1rem;
      line-height: 1.6;
    }

    /* 📱 Responsive Adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 80px 5%;
      }

      h1 {
        font-size: 2.2rem;
      }

      .box h2 {
        font-size: 1.3rem;
      }

      .box p {
        font-size: 0.95rem;
      }

      .cta-button {
        padding: 8px 16px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 60px 4%;
      }

      h1 {
        font-size: 1.8rem;
      }

      .box h2 {
        font-size: 1.1rem;
      }

      .box p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- Home Button at Top Left -->
  <a href="index.html" class="cta-button">Home Page</a>

  <div class="container">
    <h1>Our Portfolio</h1>

    <div class="grid">
      <div class="box">
        <h2><b><u>Stocks</u></b></h2>
        <p>Diversified equity portfolios tailored to growth goals.</p>
      </div>

      <div class="box">
        <h2><b><u>Mutual Funds</u></b></h2>
        <p>Diversified mutual fund investments for secured wealth generation.</p>
      </div>
    </div>
  </div>

</body>
</html>
